<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Event</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #f4f4f4;
            color: #333;
        }

        header{
            background:linear-gradient(to right, #ff4b2b, #ff416c);
            color: white;
            text-align:center;
            padding:60px 20px;
        }

        header h1{
            font-size:50px;
            margin-bottom:10px;
        }

        header p{
            font-size:20px;
        }

        nav{
            background: #222;
            padding:15px;
            text-align:center;
        }

        nav a{
            color: white;
            text-decoration:none;
            margin:0 15px;
            font-size:18px;
        }

        nav a:hover{
            color: #ff416c;
        }

        .hero{
            height:400px;
            background:url('https://images.unsplash.com/photo-1511578314322-379afb476865')
            center/cover no-repeat;
            display:flex;
            justify-content:center;
            align-items:center;
            color: white;
            text-shadow:2px 2px 10px black;
            font-size:40px;
            font-weight:bold;
        }

        .container{
            width:80%;
            margin:auto;
            padding:50px 0;
        }

        .card{
            background: white;
            padding:30px;
            margin:20px 0;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .card h2{
            margin-bottom:15px;
            color: #ff416c;
        }

        footer{
            background: #222;
            color: white;
            text-align:center;
            padding:20px;
            margin-top:30px;
        }

        button{
            background: #ff416c;
            color: white;
            border:none;
            padding:12px 25px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
            margin-top:15px;
        }

        button:hover{
            background: #ff4b2b;
        }
    </style>
</head>
<body>

    <header>
        <h1>Birthday Celebration 2026</h1>
        <p>Join us for an unforgettable event!</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </nav>

    <section class="hero">
        Welcome To The Event
    </section>

    <div class="container">

        <div class="card">
            <h2>About The Event</h2>
            <p>
                Celebrate a special birthday with music, food, dance, games,
                and unforgettable memories with friends and family.
            </p>
            <button>Register Now</button>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 Birthday Celebration. All rights reserved.</p>
    </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: #111;
            color: white;
        }

        .success-box{
            background: #222;
            padding:40px;
            width:400px;
            text-align:center;
            border-radius:15px;
            box-shadow:0 0 20px rgba(255,215,0,0.4);
        }

        .success-icon{
            font-size:70px;
            color: limegreen;
            margin-bottom:20px;
        }

        h1{
            color: gold;
            margin-bottom:15px;
        }

        p{
            font-size:18px;
            margin-bottom:25px;
        }

        .btn{
            display:inline-block;
            padding:12px 25px;
            background: gold;
            color: black;
            text-decoration:none;
            border-radius:5px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            background: white;
        }
    </style>
</head>
<body>

    <div class="success-box">

        <div class="success-icon">
            ✓
        </div>

        <h1>Order Successful!</h1>

        <p>
            Your Classic Gold watch order has been completed successfully.
        </p>

        <a href="index.html" class="btn">
            Back to Home
        </a>

    </div>

</body>
</html>
